<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Mật Khẩu</title>
    <link rel="icon" type="image/png" href="/static/logo/logo.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/taikhoan/auth.css">
    <link rel="stylesheet" href="/static/css/taikhoan/doimatkhau.css">
    <style>
        /* CSS bổ trợ cho nút ẩn/hiện mật khẩu */
        .password-group { position: relative; display: flex; align-items: center; }
        .toggle-password-btn { position: absolute; right: 10px; background: none; border: none; cursor: pointer; color: #666; padding: 0; }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="form-container" id="resetPasswordContainer">
            <form id="resetForm" novalidate>
                <h1>Đổi Mật Khẩu</h1>
                <p class="form-subtitle">Vui lòng nhập mã OTP gửi tới Email của bạn và đặt mật khẩu mới.</p>
                
                <div class="input-group">
                    <label for="resetEmailInput" class="visually-hidden">Email xác nhận</label>
                    <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                    <input type="email" id="resetEmailInput" name="email" placeholder="Xác nhận lại Email" readonly required />
                </div>
                
                <div class="input-group">
                    <label for="otpInput" class="visually-hidden">Mã OTP</label>
                    <i class="fa-solid fa-key" aria-hidden="true"></i>
                    <input type="text" id="otpInput" name="otp" placeholder="Nhập mã OTP (6 số)" required maxlength="6" inputmode="numeric" pattern="[0-9]*" />
                </div>
                
                <div class="input-group password-group">
                    <label for="newPasswordInput" class="visually-hidden">Mật khẩu mới</label>
                    <i class="fa-solid fa-lock" aria-hidden="true"></i>
                    <input type="password" id="newPasswordInput" name="password" placeholder="Mật khẩu mới (tối thiểu 8 ký tự)" required autocomplete="new-password" />
                    <button type="button" class="toggle-password-btn" id="togglePasswordBtn" aria-label="Hiển thị mật khẩu">
                        <i class="fa-solid fa-eye" aria-hidden="true"></i>
                    </button>
                </div>
                
                <div id="authAlert" class="auth-alert" aria-live="polite"></div>
                
                <button type="submit" id="submitBtn">Xác Nhận Đổi</button>
                
                <p class="auth-switch">
                    <a href="/forgot" class="back-to-login">
                        <i class="fa-solid fa-arrow-left"></i> Hủy bỏ
                    </a>
                </p>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. KHỞI TẠO ĐIỀU HƯỚNG SỚM ---
            const savedEmail = localStorage.getItem('reset_email');
            if (!savedEmail) {
                window.location.href = '/forgot';
                return; // Ngắt luồng thực thi nếu không có email hợp lệ
            }

            // --- 2. KHỞI TẠO CÁC PHẦN TỬ DOM ---
            const resetForm = document.getElementById('resetForm');
            const emailInput = document.getElementById('resetEmailInput');
            const otpInput = document.getElementById('otpInput');
            const passwordInput = document.getElementById('newPasswordInput');
            const alertBox = document.getElementById('authAlert');
            const submitBtn = document.getElementById('submitBtn');
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');

            // Điền email lưu trữ từ bước trước vào input
            emailInput.value = savedEmail;

            // --- 3. HÀM TIỆN ÍCH (UTILITIES) ---

            // Quản lý hiển thị thông báo trạng thái
            const showAlert = (message = '', type = '') => {
                if (!message) {
                    alertBox.textContent = '';
                    alertBox.className = 'auth-alert';
                    return;
                }
                alertBox.textContent = message;
                alertBox.className = `auth-alert ${type}`;
            };

            // Trạng thái nút Ẩn/Hiện mật khẩu
            const togglePasswordVisibility = () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                
                const icon = togglePasswordBtn.querySelector('i');
                if (isPassword) {
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                    togglePasswordBtn.setAttribute('aria-label', 'Ẩn mật khẩu');
                } else {
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                    togglePasswordBtn.setAttribute('aria-label', 'Hiển thị mật khẩu');
                }
            };

            // Xác thực dữ liệu đầu vào Client
            const validateForm = (otp, password) => {
                if (!/^\d{6}$/.test(otp)) {
                    return "Mã OTP phải đủ 6 chữ số!";
                }

                // Yêu cầu bảo mật: Tối thiểu 8 ký tự, bao gồm cả chữ và số
                const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
                if (!passwordRegex.test(password)) {
                    return "Mật khẩu mới phải từ 8 ký tự, gồm ít nhất 1 chữ cái và 1 số!";
                }

                return null; // Không có lỗi
            };

            // Đặt trạng thái nút Submit
            const setSubmittingState = (isSubmitting) => {
                submitBtn.disabled = isSubmitting;
                submitBtn.textContent = isSubmitting ? "Đang xác thực..." : "Xác Nhận Đổi";
            };

            // --- 4. LẮNG NGHE SỰ KIỆN (EVENT LISTENERS) ---

            // Sự kiện Click ẩn/hiện mật khẩu
            togglePasswordBtn.addEventListener('click', togglePasswordVisibility);

            // Sự kiện Submit form
            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                showAlert(); // Reset thông báo cũ

                const email = emailInput.value;
                const otp = otpInput.value.trim();
                const password = passwordInput.value;

                // Xác thực Client
                const errorMessage = validateForm(otp, password);
                if (errorMessage) {
                    showAlert(errorMessage, 'error');
                    return;
                }

                setSubmittingState(true);

                try {
                    // Gọi API Backend
                    const response = await fetch('/api/reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // Payload chuẩn hóa cấu trúc gọn gàng
                        body: JSON.stringify({ email, otp, password })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        // Xóa email lưu tạm sau khi đổi thành công
                        localStorage.removeItem('reset_email');

                        showAlert(data.message || "Đổi mật khẩu thành công! Đang chuyển hướng...", 'success');
                        
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        showAlert(data.message || "Đổi mật khẩu thất bại!", 'error');
                        setSubmittingState(false);
                    }
                } catch (error) {
                    console.error('Reset Password Error:', error);
                    showAlert("Không thể kết nối đến máy chủ. Vui lòng thử lại sau!", 'error');
                    setSubmittingState(false);
                }
            });
        });
    </script>
</body>
</html>
