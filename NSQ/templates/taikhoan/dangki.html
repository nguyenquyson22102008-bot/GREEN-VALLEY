<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản</title>
    <link rel="icon" type="image/png" href="/static/logo/logo.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/taikhoan/auth.css">
    <link rel="stylesheet" href="/static/css/taikhoan/dangki.css">
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="registerForm" novalidate>
                <h1>Tạo Tài Khoản</h1>
                <p class="form-subtitle">Điền thông tin để đăng ký thành viên</p>
                
                <div class="input-group">
                    <label for="regFullname" class="visually-hidden">Họ và tên</label>
                    <i class="fa-solid fa-user" aria-hidden="true"></i>
                    <input type="text" id="regFullname" name="fullname" placeholder="Họ và tên" required autocomplete="name" />
                </div>

                <div class="input-group">
                    <label for="regEmail" class="visually-hidden">Email</label>
                    <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                    <input type="email" id="regEmail" name="email" placeholder="Email" required autocomplete="email" />
                </div>
                
                <div class="input-group">
                    <label for="regPassword" class="visually-hidden">Mật khẩu</label>
                    <i class="fa-solid fa-lock" aria-hidden="true"></i>
                    <input type="password" id="regPassword" name="password" placeholder="Mật khẩu (Mật khẩu từ 8 ký tự, gồm cả chữ và số)" required autocomplete="new-password" />
                    <button type="button" class="toggle-password-btn" aria-label="Hiển thị mật khẩu">
                        <i class="fa-solid fa-eye" aria-hidden="true"></i>
                    </button>
                </div>

                <div class="input-group">
                    <label for="regConfirmPassword" class="visually-hidden">Xác nhận mật khẩu</label>
                    <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
                    <input type="password" id="regConfirmPassword" name="confirm_password" placeholder="Xác nhận mật khẩu" required autocomplete="new-password" />
                    <button type="button" class="toggle-password-btn" aria-label="Hiển thị mật khẩu">
                        <i class="fa-solid fa-eye" aria-hidden="true"></i>
                    </button>
                </div>
                
                <div id="authAlert" class="auth-alert" aria-live="polite"></div>
                
                <button type="submit" id="submitBtn">Đăng Ký</button>
                
                <p class="auth-switch">
                    Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. KHỞI TẠO CÁC PHẦN TỬ DOM ---
            const form = document.getElementById('registerForm');
            const alertBox = document.getElementById('authAlert');
            const submitBtn = document.getElementById('submitBtn');
            const togglePasswordBtns = document.querySelectorAll('.toggle-password-btn');

            // --- 2. HÀM TIỆN ÍCH (UTILITIES) ---
            
            // Quản lý hiển thị thông báo trạng thái
            const showAlert = (message = '', type = 'error') => {
                if (!message) {
                    alertBox.textContent = '';
                    alertBox.className = 'auth-alert';
                    return;
                }
                alertBox.textContent = message;
                alertBox.className = `auth-alert ${type}`;
            };

            // Hàm xử lý Ẩn/Hiện mật khẩu
            const togglePasswordVisibility = (button) => {
                // Tìm thẻ input nằm cùng cấp input-group
                const input = button.closest('.input-group').querySelector('input');
                const icon = button.querySelector('i');
                const isPassword = input.type === 'password';
                
                input.type = isPassword ? 'text' : 'password';
                
                if (isPassword) {
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                    button.setAttribute('aria-label', 'Ẩn mật khẩu');
                } else {
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                    button.setAttribute('aria-label', 'Hiển thị mật khẩu');
                }
            };

            // Hàm xác thực dữ liệu đầu vào Client
            const validateForm = (fullname, email, password, confirmPassword) => {
                if (!fullname || !email || !password || !confirmPassword) {
                    return "Vui lòng nhập đầy đủ tất cả các trường thông tin!";
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    return "Định dạng email không hợp lệ!";
                }

                // Yêu cầu mật khẩu: Ít nhất 8 ký tự, có chứa ít nhất 1 chữ cái và 1 chữ số
                const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
                if (!passwordRegex.test(password)) {
                    return "Mật khẩu phải từ 8 ký tự, bao gồm ít nhất 1 chữ cái và 1 số!";
                }

                if (password !== confirmPassword) {
                    return "Mật khẩu nhập lại không trùng khớp!";
                }

                return null; // Không phát hiện lỗi
            };

            // Quản lý trạng thái chờ gửi API (Loading State)
            const setSubmittingState = (isSubmitting) => {
                submitBtn.disabled = isSubmitting;
                submitBtn.textContent = isSubmitting ? "Đang xử lý..." : "Đăng Ký";
            };

            // --- 3. GẮN SỰ KIỆN (EVENT LISTENERS) ---
            
            // Gắn sự kiện Click cho các nút Ẩn/Hiện mật khẩu
            togglePasswordBtns.forEach(btn => {
                btn.addEventListener('click', () => togglePasswordVisibility(btn));
            });

            // Gắn sự kiện Submit Form
            form.addEventListener('submit', async (e) => {
                e.preventDefault(); 
                showAlert(); // Reset thông báo cũ

                const fullname = document.getElementById('regFullname').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirmPassword = document.getElementById('regConfirmPassword').value;

                // Xác thực dữ liệu Client
                const errorMessage = validateForm(fullname, email, password, confirmPassword);
                if (errorMessage) {
                    showAlert(errorMessage);
                    return;
                }

                setSubmittingState(true);

                // Gửi Request API
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fullname, email, password })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        showAlert(data.message || "Đăng ký thành công! Đang chuyển hướng...", 'success');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        showAlert(data.message || "Đăng ký thất bại!");
                        setSubmittingState(false);
                    }
                } catch (error) {
                    console.error("Lỗi kết nối hệ thống:", error);
                    showAlert("Không thể kết nối đến máy chủ. Vui lòng thử lại sau!");
                    setSubmittingState(false);
                }
            });
        });
    </script>
</body>
</html>
