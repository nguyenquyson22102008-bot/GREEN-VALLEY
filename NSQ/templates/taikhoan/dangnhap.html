<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <link rel="icon" type="image/png" href="/static/logo/logo.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/taikhoan/auth.css">
    <link rel="stylesheet" href="/static/css/taikhoan/dangnhap.css">
    <style>
        /* CSS bổ trợ tăng tính chuẩn xác cho nút toggle mật khẩu */
        .password-group { position: relative; display: flex; align-items: center; }
        .toggle-password-btn { position: absolute; right: 10px; background: none; border: none; cursor: pointer; color: #666; padding: 0; }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-in-container">
            <form id="loginForm" novalidate>
                <h1>Đăng Nhập</h1>
                <p class="form-subtitle">Chào mừng bạn quay trở lại</p>
                
                <div class="input-group">
                    <label for="loginEmail" class="visually-hidden">Email</label>
                    <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                    <input type="email" id="loginEmail" name="email" placeholder="Email" required autocomplete="email" />
                </div>
                
                <div class="input-group password-group">
                    <label for="loginPassword" class="visually-hidden">Mật khẩu</label>
                    <i class="fa-solid fa-lock" aria-hidden="true"></i>
                    <input type="password" id="loginPassword" name="password" placeholder="Mật khẩu" required autocomplete="current-password" />
                    <button type="button" class="toggle-password-btn" id="togglePasswordBtn" aria-label="Hiển thị mật khẩu">
                        <i class="fa-solid fa-eye" aria-hidden="true"></i>
                    </button>
                </div>

                <div class="remember-forgot-container">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberCheckbox" name="remember"> Ghi nhớ tôi
                    </label>
                    <a href="/forgot" class="forgot-password">Quên mật khẩu?</a>
                </div>
                
                <div id="authAlert" class="auth-alert" aria-live="polite"></div>
                
                <button type="submit" id="submitBtn">Đăng Nhập</button>
                
                <p class="auth-switch">
                    Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. KHỞI TẠO CÁC PHẦN TỬ DOM ---
            const loginForm = document.getElementById('loginForm');
            const alertBox = document.getElementById('authAlert');
            const submitBtn = document.getElementById('submitBtn');
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const passwordInput = document.getElementById('loginPassword');

            // --- 2. HÀM TIỆN ÍCH (UTILITIES) ---

            // Quản lý hiển thị thông báo trạng thái
            const showAlert = (message = '', type = '') => {
                if (!message) {
                    alertBox.textContent = '';
                    alertBox.className = 'auth-alert';
                    return;
                }
                alertBox.textContent = message;
                alertBox.className = `auth-alert ${type}`;
            };

            // Trạng thái nút Ẩn/Hiện mật khẩu
            const togglePasswordVisibility = () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                
                const icon = togglePasswordBtn.querySelector('i');
                if (isPassword) {
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                    togglePasswordBtn.setAttribute('aria-label', 'Ẩn mật khẩu');
                } else {
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                    togglePasswordBtn.setAttribute('aria-label', 'Hiển thị mật khẩu');
                }
            };

            // Xác thực dữ liệu Client
            const validateForm = (email, password) => {
                if (!email || !password) {
                    return 'Vui lòng nhập đầy đủ Email và Mật khẩu!';
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    return 'Định dạng email không hợp lệ!';
                }

                return null; // Không có lỗi
            };

            // Đặt trạng thái nút Submit khi xử lý API
            const setSubmittingState = (isSubmitting) => {
                submitBtn.disabled = isSubmitting;
                submitBtn.textContent = isSubmitting ? 'Đang xử lý...' : 'Đăng Nhập';
            };

            // Lưu trữ thông tin người dùng cục bộ
            const saveUserSession = (data, email, remember) => {
                const storage = remember ? localStorage : sessionStorage;
                storage.setItem('auth_user', JSON.stringify({
                    fullname: data.fullname || '',
                    email: data.email || email
                }));
            };

            // --- 3. LẮNG NGHE SỰ KIỆN (EVENT LISTENERS) ---

            // Sự kiện click nút ẩn/hiện mật khẩu
            togglePasswordBtn.addEventListener('click', togglePasswordVisibility);

            // Sự kiện submit form
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                showAlert(); // Reset thông báo cũ

                const email = document.getElementById('loginEmail').value.trim();
                const password = passwordInput.value;
                const remember = document.getElementById('rememberCheckbox').checked;

                // Xác thực Client
                const errorMessage = validateForm(email, password);
                if (errorMessage) {
                    showAlert(errorMessage, 'error');
                    return;
                }

                // Chuyển UI sang trạng thái gửi dữ liệu
                setSubmittingState(true);

                try {
                    // Gọi API Backend
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // Rút gọn Payload đồng bộ: email thay vì loginEmail, password thay vì loginPassword
                        body: JSON.stringify({ email, password }) 
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        saveUserSession(data, email, remember);
                        showAlert(data.message || 'Đăng nhập thành công!', 'success');
                        
                        setTimeout(() => {
                            window.location.href = '/home';
                        }, 700);
                    } else {
                        showAlert(data.message || 'Đăng nhập thất bại. Vui lòng thử lại!', 'error');
                        setSubmittingState(false);
                    }
                } catch (error) {
                    console.error('Login Error:', error);
                    showAlert('Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại mạng!', 'error');
                    setSubmittingState(false);
                }
            });
        });
    </script>
</body>
</html>
